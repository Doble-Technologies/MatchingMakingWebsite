name: Web Deployment Non-Production
on:
  workflow_call:
    inputs:
      environments:
        type: string
        description: An optional list of environments to deploy to.
        default: 'dev'
      workflow_type:
        type: string
        description: An optional string for workflow types.
        default: 'dev'
      branch:
        type: string
        description: An optional string to define which branch to checkout.
        default: 'main'
      current_version:
        type: string
        description: Current Version of the package.json.
        default: '0.0.0'
jobs:
  check-inputs:
    runs-on: 'nas'
    environment: ${{ inputs.environments }}
    steps:
      - name: Check secrets present
        run: |
          if [[ -z "${{ secrets.DOCKERHUB_USER }}" ]]; then
            echo "DOCKERHUB_USER secret is empty or missing"
            exit 1
          else
            echo "DOCKERHUB_USER secret is set"
          fi
          if [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "DOCKERHUB_TOKEN secret is empty or missing"
            exit 1
          else
            echo "DOCKERHUB_TOKEN secret is set"
          fi
          echo "Current Version: ${{inputs.current_version}}"
  build:
    needs: check-inputs
    if: needs.check-inputs.result == 'success' && inputs.workflow_type != 'release' && github.actor != 'renovate-bot'
    environment: ${{ inputs.environments }}
    runs-on: 'nas'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Branch Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}
      - name: Login to Docker
        uses: docker/login-action@v4
        with:
          registry: registry.rcslabs.dev
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Docker Build Backend
        run: docker build -f Dockerfile -t registry.rcslabs.dev/doble/matchmaking:latest_web ./ --build-arg ENVIRONMENT=dev
      - name: Docker Push Backend
        run: docker push registry.rcslabs.dev/doble/matchmaking:latest_web
  deploy:
   needs: build
   if: needs.build.result == 'success' && inputs.workflow_type != 'release'
   environment: ${{ inputs.environments }}
   runs-on: 'nas'
   permissions:
     contents: read
     packages: write
   steps:
     - name: Deploy to Team City Dev
       run: |
         echo ${{ secrets.TEAMCITY_URL }}
         curl -s -X POST \
           "${{ secrets.TEAMCITY_URL }}/app/rest/buildQueue" \
           -H "Authorization: Bearer ${{ secrets.TEAMCITY_TOKEN }}" \
           -H "Content-Type: application/xml" \
           -H "Accept: application/json" \
           -d '<build><buildType id="MatchMaking_UI_Build_DEV"/></build>'